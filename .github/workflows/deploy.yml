name: Build & Deploy Flappy Kiro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Permite trigger manual desde GitHub UI

# Permisos necesarios para que GitHub Actions pueda publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos; si hay uno en curso, el nuevo espera
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # pygame en CI necesita librerías SDL para no fallar al importar
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest flappy_kiro/tests/ -v --tb=short

  # ── Job 2: Build WASM con Pygbag ─────────────────────────────────────────────
  build:
    name: Build Web (Pygbag)
    runs-on: ubuntu-latest
    needs: test   # Solo buildea si los tests pasan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pygbag

      - name: Build with Pygbag
        run: |
          python -m pygbag --build \
            --app_name "Flappy Kiro" \
            --width 400 \
            --height 600 \
            flappy_kiro/main_web.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  # ── Job 3: Deploy a GitHub Pages (solo en push a main) ───────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print game URL
        run: |
          echo "✅ Deploy completado!"
          echo "🎮 Juega en: ${{ steps.deployment.outputs.page_url }}"
